name: Bug Report
description: Report a reproducible problem without including sensitive data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include real payroll, bank, tax, credential, or personal data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Use synthetic data only.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Notes
      description: Commands, screenshots, or checks, with sensitive data removed.
